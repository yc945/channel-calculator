name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'  # 用更稳定版本
    
    - name: Install Flet
      run: |
        pip install flet==0.19.0  # 使用稳定旧版本
    
    - name: Build APK
      run: |
        flet build apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/*.apk
