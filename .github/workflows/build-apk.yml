name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.9'
        channel: 'stable'
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Flet
      run: |
        pip install flet
    
    - name: Accept Android Licenses
      run: |
        yes | flutter doctor --android-licenses || true
    
    - name: Build APK
      run: |
        echo "y" | flet build apk || true
        
    - name: Find and Upload APK
      run: |
        find . -name "*.apk" -exec cp {} app.apk \;
      continue-on-error: true
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: |
          **/*.apk
          app.apk
