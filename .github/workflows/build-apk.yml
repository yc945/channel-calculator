name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install flet
    
    - name: Build APK
      run: |
        # 添加 Android 配置
        flet build apk \
          --compile-template \
          --android-permissions "INTERNET" \
          --android-permissions "WRITE_EXTERNAL_STORAGE"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/*.apk
